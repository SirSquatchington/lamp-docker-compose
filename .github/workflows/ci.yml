name: CI - Build and Validate LAMP Stack

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t lamp-webserver .

      - name: Start containers
        run: docker compose up -d

      - name: Wait for containers to be ready
        run: sleep 10

      - name: Check webserver is running
        run: docker compose ps | grep "webserver"

      - name: Check database is running
        run: docker compose ps | grep "db"

      - name: Tear down containers
        run: docker compose down
